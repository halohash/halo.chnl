<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-status-bar-style" content="#ee0826">
    <meta name="apple-mobile-web-app-title" content="webchnl">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <title>{{ page.abtitle }} | {{ site.watchtitle }}</title>

    <!-- Open Graph -->
    <meta property="og:title" content="{{ page.abtitle }} | {{ site.watchtitle }}" />
    <meta property="og:description" content="Watch {{ page.abtitle }} on {{ site.watchtitle }}" />
    <meta property="og:url" content="/watch/index.php?slug={{ page.abtitle }}" />
    <meta property="og:image" content="{{ page.chnlicon }}" />
    <meta name="og:site_name" content="webchnl">

    <!-- Twitter -->
    <meta name="twitter:site" content="@webchnl">

    <!-- Theme -->
    <meta name="theme-color" content="#ee0826" />

    <!-- Video.js CSS -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />

    <!-- Your CSS -->
    <link rel="stylesheet" href="https://webchnl.com/assets/css/watch.css?12">

    <style>
        body {
            background-image: url("{{ page.bg }}");
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            min-height: 100dvh;
            margin: 0;
        }

        .topbar {
            backdrop-filter: blur(10px);
            background-color: {{ page.color }};
        }

        .info {
            backdrop-filter: blur(10px);
            background-color: {{ page.color }};
            padding: 10px;
        }

        .player {
            padding: 10px;
        }
    </style>
</head>

<body>

    <div class="topbar">
        <a href="./">
            <button class="menubutton">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M18 6 6 18M6 6l12 12"/>
                </svg>
            </button>
        </a>
        <p id="channel-title-text">{{ page.abtitle }}</p>
    </div>

    <div class="main">

        <div class="player">
            <video 
                id="my-video"
                class="video-js vjs-fluid"
                playsinline
                loop
                controls
                preload="auto"
                poster="{{ page.poster }}"
                data-setup="{}"
            >
                <source src="{{ page.m3u8 }}" type="application/x-mpegURL">
                <source src="{{ page.offline }}" type="application/x-mpegURL">

                <p class="vjs-no-js">
                    To view this video please enable JavaScript and use a modern browser.
                </p>
            </video>
        </div>

        <div class="info">
            <h1 id="about-title">About {{ page.abtitle }}</h1>
            <div id="about-description">
                <p>
                    {{ page.desc }}<br>
                    This page was last updated on 
                    {{ site.time | date: "%a, %d %b %Y at %H:%M." }}
                </p>
            </div>
        </div>

    </div>

    <!-- Video.js JS (REQUIRED) -->
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

    <!-- Optional: Explicit init (helps debugging) -->
    <script>
        const player = videojs('my-video');

        player.ready(function () {
            console.log("Video.js is ready");
        });

        player.on('error', function () {
            console.error("Video error:", player.error());
        });
    </script>

</body>
</html>
